name: CI

on:
  push:
    branches: [develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: |
            api/package-lock.json

      - name: Install API dependencies
        working-directory: api
        run: npm install

      - name: Lint API
        working-directory: api
        run: npm run lint

      - name: Test API
        working-directory: api
        run: npm run test